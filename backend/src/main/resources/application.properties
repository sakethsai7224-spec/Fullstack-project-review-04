server.port=${PORT:5001}

spring.application.name=relief-connection-backend

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:relief_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.cache.period=0

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.enabled=${EMAIL_ENABLED:true}
app.mail.provider=${MAIL_PROVIDER:smtp}
app.mail.from=${EMAIL_USER:}
app.mail.resend.api-key=${RESEND_API_KEY:}
app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:5173,http://127.0.0.1:5173,https://fullstack-project-review-04-production-63c1.up.railway.app,https://*.up.railway.app,https://*.onrender.com}
